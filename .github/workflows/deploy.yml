name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 37.1.211.14 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p 22" dist/ deploy@37.1.211.14:/var/www/botyan/dist/
          rsync -az -e "ssh -i ~/.ssh/deploy_key -p 22" server/contact-server.mjs deploy@37.1.211.14:/opt/botyan-api/
          ssh -i ~/.ssh/deploy_key -p 22 deploy@37.1.211.14 'sudo systemctl restart botyan-api'
